releaseNotes: |
  The free tier now has a clear limit on synced accounts, and BitGarth prompts
  you to upgrade when you reach it.

  New:

  - Account limits on the free tier, with prompts that link to the Upgrade page
  - Each paid plan's terms now appear beside its card, with whole-dollar yearly pricing

  Fixes:

  - Wallet lookups surface CoinGecko rate-limit messages, not a generic error
  - More reliable manual-asset price lookups, with caching when no API key is set
  - UI polish across notice surfaces, account-list accents, and section numbering

  Full release notes at https://bitgarth.app/releases.html#0.1.7
