version: "0.1.7"
tagline: Self-hosted crypto accounting exports
description: >-
  BitGarth turns your self-custody crypto into clean, plain-text accounting —
  without an account, an email, or a third party holding your keys.


  Point it at your Bitcoin xpubs and Ethereum addresses and it pulls the
  transactions, classifies them, and keeps your balances in sync — never
  touching a seed phrase or private key. Search 17,000+ assets to track
  balances you hold elsewhere, and your whole crypto net worth reads as one
  number, worked out locally.


  Everything — wallet data, labels, settings, saved API keys — lives in an
  encrypted database that opens with your password, and only your password. We
  cannot unlock it for you, and that is the point: keep a backup.


  Plain text out: accounting journals that both hledger and ledger-cli read —
  and so can humans, Git, and every LLM. Your numbers, in a quiet garden of
  your own.
