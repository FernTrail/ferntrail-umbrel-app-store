releaseNotes: >-
  Wallet reports now value your holdings using real market prices pulled from
  data providers, instead of relying only on manual or zero prices. New: a
  year-dial to pick the date range on the Wallets page, transactions default to
  the current year with simpler filters, and price sources are shown in reports.
  Fixes: zero balances no longer skew report prices, manual asset assertions
  carry forward across years, and identicon line glyphs render correctly.
