version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ferntrail-bitgarth_web_1
      APP_PORT: 8080

  web:
    image: bitgarth/bitgarth:0.1.5@sha256:0dc38f778db1894092ef0d9d3887552495cc65ed14652bb062f74d917aec03cb
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      BITGARTH_CHANNEL: umbrel
